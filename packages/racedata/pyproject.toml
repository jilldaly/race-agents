[project]
name = "racedata"
version = "0.1.0"
description = "Shared bronze-layer race-results access for the race-agents monorepo."
requires-python = ">=3.11"
dependencies = ["pyyaml>=6.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["racedata"]
