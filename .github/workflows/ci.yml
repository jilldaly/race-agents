name: ci
on: [push, pull_request]
jobs:
  racedata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e packages/racedata pytest
      - run: pytest packages/racedata -q
